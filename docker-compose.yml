# Local / demo production-like stack: Postgres + CDMS (API + static UI)
# Usage: copy server/.env.example → .env in repo root or export vars, then:
#   docker compose up --build
#
# First run applies migrations via image CMD. Set JWT_SECRET and FRONTEND_URL for real use.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cdms
      POSTGRES_PASSWORD: cdms
      POSTGRES_DB: cdms
    volumes:
      - cdms_pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cdms -d cdms']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgresql://cdms:cdms@db:5432/cdms
      DIRECT_URL: postgresql://cdms:cdms@db:5432/cdms
      JWT_SECRET: ${JWT_SECRET:-change-me-use-long-random-secret-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
      NODE_ENV: production
      PORT: '5000'
      SERVE_STATIC: 'true'
      CLIENT_DIST_PATH: /app/client/build
    depends_on:
      db:
        condition: service_healthy

volumes:
  cdms_pgdata:
